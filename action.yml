# action.yml — praxisflux as a composite GitHub Action: the CI consumption surface for the gates.
#
# Consumer repos pin a released tag and pick their gates:
#
#   - uses: actions/checkout@v4
#     with: { fetch-depth: 0 }          # wiki-freshness resolves pins through git history
#   - uses: evanstern/praxisflux@v0.4.0
#     with:
#       gates: spec-bridge, wiki-freshness
#
# The step below runs the gate runner via `npx @praxisflux/gates@<pin>` — the npm package carved
# by scripts/build-npm.mjs from this same tree. The pin is stamped by scripts/sync-version.mjs
# (lockstep with the marketplace version), and release.yml publishes that npm version BEFORE
# creating the tag, so a released tag always resolves a live package — no race. Consumers'
# `uses:` line is unchanged from the run-from-checkout era. Contract: docs/consuming-gates.md.
name: "praxisflux gates"
description: "Run praxisflux gate checks (spec-bridge, wiki-freshness, course) against a repository"
inputs:
  gates:
    description: "Comma-separated gates to run: spec-bridge, wiki-freshness, course. Unknown names fail the build."
    required: true
  path:
    description: "Repository root to check, relative to the workspace"
    required: false
    default: "."
  wiki-dir:
    description: "Grounded-corpus directory for wiki-freshness, relative to path"
    required: false
    default: "docs/wiki"
  course-dir:
    description: "Built course directory for the course gate, relative to path"
    required: false
    default: "docs/course"
runs:
  using: "composite"
  steps:
    - name: Run praxisflux gates
      shell: bash
      run: |
        npx --yes @praxisflux/gates@0.6.2 \
          --gates "${{ inputs.gates }}" \
          --path "${{ inputs.path }}" \
          --wiki-dir "${{ inputs['wiki-dir'] }}" \
          --course-dir "${{ inputs['course-dir'] }}"
