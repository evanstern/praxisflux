# release — every merge to main whose marketplace version is new publishes the npm package
# (@praxisflux/gates) and a GitHub Release v<version> with each plugin packaged as a zip, in that
# order: the release step is what creates the tag, so a tag can never exist whose npm version
# isn't already live — which is what lets action.yml run `npx <package>@<pin>` race-free.
# Idempotent: if the tag already exists (e.g. a docs-only merge, or a re-run), it publishes
# nothing; a re-run after a partial failure skips the npm half if that version is already on
# the registry. The ci workflow's bump gate guarantees substantive PRs arrive with a fresh
# version, so merge ⇒ release needs no manual step. Bump rules and recipe: docs/releasing.md.
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the tag + release
  id-token: write # npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm # the npmjs.com trusted publisher requires this environment claim in the OIDC token
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # tags needed to detect an already-released version
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: read version, check for existing tag
        id: v
        run: |
          version="$(node -p "require('./.claude-plugin/marketplace.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "v$version already released — nothing to do"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi
      - name: re-verify on main
        if: steps.v.outputs.new == 'true'
        run: |
          node --test
          node scripts/gen-marketplace.mjs --check
          node scripts/sync-version.mjs --check
      - name: publish npm package # before the tag exists — a released tag implies its npm version is live
        if: steps.v.outputs.new == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Auth is OIDC trusted publishing (id-token: write + the trusted publisher configured
          # on npmjs.com for this repo/workflow; provenance is automatic). Needs npm >= 11.5.1 —
          # node 22 bundles npm 10. If an NPM_TOKEN secret exists it is used as a fallback
          # instead (bootstrap / break-glass); GATs stop publishing ~Jan 2027, so it should
          # stay deleted in the steady state.
          npm install -g npm@latest
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
            echo "using NPM_TOKEN fallback auth"
          fi
          node scripts/build-npm.mjs
          name="$(node -p "require('./dist/npm/package.json').name")"
          if npm view "$name@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
            echo "$name@${{ steps.v.outputs.version }} already on npm — nothing to do"
          else
            npm publish ./dist/npm --access public
          fi
      - name: build + zip each plugin
        if: steps.v.outputs.new == 'true'
        run: |
          node scripts/build.mjs
          cd dist
          for d in */; do
            p="${d%/}"
            zip -qr "$p-v${{ steps.v.outputs.version }}.zip" "$p"
          done
          ls -l *.zip
      - name: publish GitHub Release
        if: steps.v.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.v.outputs.version }}" dist/*.zip \
            --title "v${{ steps.v.outputs.version }}" \
            --generate-notes
