# release — every merge to main whose marketplace version is new publishes a GitHub Release
# v<version> with each plugin packaged as a zip. Idempotent: if the tag already exists (e.g. a
# docs-only merge, or a re-run), it publishes nothing. The ci workflow's bump gate guarantees
# substantive PRs arrive with a fresh version, so merge ⇒ release needs no manual step.
# Bump rules and recipe: docs/releasing.md.
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the tag + release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # tags needed to detect an already-released version
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: read version, check for existing tag
        id: v
        run: |
          version="$(node -p "require('./.claude-plugin/marketplace.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "v$version already released — nothing to do"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi
      - name: re-verify on main
        if: steps.v.outputs.new == 'true'
        run: |
          node --test
          node scripts/gen-marketplace.mjs --check
          node scripts/sync-version.mjs --check
      - name: build + zip each plugin
        if: steps.v.outputs.new == 'true'
        run: |
          node scripts/build.mjs
          cd dist
          for d in */; do
            p="${d%/}"
            zip -qr "$p-v${{ steps.v.outputs.version }}.zip" "$p"
          done
          ls -l *.zip
      - name: publish GitHub Release
        if: steps.v.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.v.outputs.version }}" dist/*.zip \
            --title "v${{ steps.v.outputs.version }}" \
            --generate-notes
